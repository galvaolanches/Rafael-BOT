<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Ketty Personalizados</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Relógio e Status */
        .status-container { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        .status-info { display: flex; align-items: center; gap: 12px; }
        .bola-status { width: 12px; height: 12px; border-radius: 50%; background: #ccc; }
        #relogio-digital { font-size: 22px; font-weight: bold; color: #075e54; font-family: monospace; }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: #075e54; color: white; padding: 20px; border-radius: 12px; text-align: center; }
        .card h3 { margin: 0; font-size: 14px; opacity: 0.8; text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 28px; font-weight: bold; }
        .card.money { background: #28a745; border-bottom: 5px solid #1e7e34; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; color: #666; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .status-Pendente { background: #fff5c4; color: #856404; }
        .status-Producao { background: #cce5ff; color: #004085; }
        .status-Pronto { background: #d4edda; color: #155724; }
        .btn-acao { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; color: white; margin-right: 4px; }
        .btn-prod { background: #007bff; }
        .btn-pronto { background: #28a745; }
        .btn-del { background: #dc3545; }
        .btn-pix { background: #0080ff; }
        .btn-limpar { background: #6c757d; }
        .btn-acao:hover { opacity: 0.8; transform: scale(1.02); }
        .input-valor { width: 80px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        .wa-link { color: #25d366; font-size: 22px; text-decoration: none; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-container">
            <div class="status-info">
                <div id="bola" class="bola-status"></div>
                <span id="texto-status" style="font-weight: 600; font-size: 14px;">VERIFICANDO...</span>
            </div>
            <div id="relogio-digital">00:00:00</div>
        </div>

        <div class="dashboard">
            <div class="card"><h3>📦 Total Pedidos</h3><p id="dash-total">0</p></div>
            <div class="card"><h3>🎨 Em Produção</h3><p id="dash-prod">0</p></div>
            <div class="card money"><h3>💰 Faturamento Bruto</h3><p>R$ <span id="dash-money">0,00</span></p></div>
        </div>
        <header>
            <h1><i class="fa-solid fa-store"></i> Gestão Ketty</h1>
            <div>
                <button class="btn-acao btn-limpar" onclick="limparTudo()"><i class="fa-solid fa-trash-can"></i> Limpar Lista</button>
                <button onclick="carregarDados()" style="padding: 10px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer;"><i class="fa-solid fa-arrows-rotate"></i></button>
            </div>
        </header>
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Pedido</th>
                    <th>Status</th>
                    <th>Cobrança (50%)</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-pedidos"></tbody>
        </table>
    </div>
    <script>
        let totalPedidosAnterior = 0;

        // Função do Relógio e Horário de Trabalho
        function atualizarRelogio() {
            const agora = new Date();
            const h = String(agora.getHours()).padStart(2, '0');
            const m = String(agora.getMinutes()).padStart(2, '0');
            const s = String(agora.getSeconds()).padStart(2, '0');
            document.getElementById('relogio-digital').innerText = `${h}:${m}:${s}`;

            const hora = agora.getHours();
            const bola = document.getElementById('bola');
            const texto = document.getElementById('texto-status');

            // Aberto das 08h às 18h
            if (hora >= 8 && hora < 18) {
                bola.style.background = "#28a745";
                bola.style.boxShadow = "0 0 8px #28a745";
                texto.innerText = "SISTEMA ATIVO (ABERTO)";
                texto.style.color = "#28a745";
            } else {
                bola.style.background = "#dc3545";
                bola.style.boxShadow = "0 0 8px #dc3545";
                texto.innerText = "SISTEMA EM ESPERA (FECHADO)";
                texto.style.color = "#dc3545";
            }
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        function tocarSomVenda() {
            new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3').play().catch(e => {});
        }

        async function carregarDados() {
            try {
                const resDash = await fetch('/api/dashboard');
                const d = await resDash.json();
                if (totalPedidosAnterior !== 0 && d.total > totalPedidosAnterior) tocarSomVenda();
                totalPedidosAnterior = d.total;
                document.getElementById('dash-total').innerText = d.total;
                document.getElementById('dash-prod').innerText = d.producao;
                document.getElementById('dash-money').innerText = d.faturamento.toFixed(2).replace('.', ',');

                const resPedidos = await fetch('/api/pedidos');
                const pedidos = await resPedidos.json();
                const tbody = document.getElementById('tabela-pedidos');
                tbody.innerHTML = '';
                pedidos.forEach(p => {
                    const statusClasse = p.status.replace(/\s+/g, '');
                    tbody.innerHTML += `
                        <tr>
                            <td><small>${p.data}</small></td>
                            <td><strong>${p.cliente_nome}</strong></td>
                            <td>${p.pedido}</td>
                            <td><span class="status-badge status-${statusClasse}">${p.status}</span></td>
                            <td>
                                <input type="number" id="valor-${p.id}" class="input-valor" placeholder="Total R$">
                                <button class="btn-acao btn-pix" onclick="enviarPixSinal(${p.id})"><i class="fa-solid fa-money-bill-transfer"></i> Pix</button>
                            </td>
                            <td>
                                <button class="btn-acao btn-prod" onclick="mudarStatus(${p.id}, 'Em Produção')">Produção</button>
                                <button class="btn-acao btn-pronto" onclick="mudarStatus(${p.id}, 'Pronto')">Concluir</button>
                                <button class="btn-acao btn-del" onclick="excluirPedido(${p.id})"><i class="fa-solid fa-trash"></i></button>
                                <a href="https://wa.me/${p.cliente_numero}" target="_blank" class="wa-link"><i class="fa-brands fa-whatsapp"></i></a>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        async function enviarPixSinal(id) {
            const valorTotal = document.getElementById(`valor-${id}`).value;
            if (!valorTotal) return alert("Digite o valor total primeiro!");
            const res = await fetch('/api/enviar-pix-sinal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, valorTotal })
            });
            const data = await res.json();
            if (data.success) alert("🚀 Mensagem de sinal enviada!");
        }

        async function mudarStatus(id, novoStatus) {
            await fetch('/api/status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, novoStatus })
            });
            carregarDados();
        }

        async function excluirPedido(id) {
            if(confirm("Deseja apagar este pedido?")) {
                await fetch(`/api/pedidos/${id}`, { method: 'DELETE' });
                carregarDados();
            }
        }

        async function limparTudo() {
            if(confirm("Apagar todos os pedidos?")) {
                await fetch('/api/limpar-todos', { method: 'DELETE' });
                carregarDados();
            }
        }

        carregarDados();
        setInterval(carregarDados, 10000);
    </script>
</body>
</html>
